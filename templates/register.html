<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Personal Expense Analyzer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card" style="max-width: 540px;">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-4 p-3 mb-3" style="width: 60px; height: 60px;">
                    <i class="bi bi-cpu-fill fs-2 text-primary"></i>
                </div>
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-muted small">Register to experience personalized AI wealth insights</p>
            </div>

            {% if error %}
            <div class="alert alert-danger border-0 rounded-3 small p-3 mb-3" role="alert" style="background-color: rgba(244, 63, 94, 0.1); color: var(--accent-color);">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/register" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="username" class="form-label small fw-semibold text-muted">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="e.g. janesmith" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="email" class="form-label small fw-semibold text-muted">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="name@domain.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="persona" class="form-label small fw-semibold text-muted">Financial Persona (Determines Baseline Analytics)</label>
                    <select class="form-select" id="persona" name="persona" required>
                        <option value="" disabled selected>Choose your lifestyle persona...</option>
                        <option value="Student">Student (Focuses on pocket money & study costs)</option>
                        <option value="Employee">Employee (Focuses on salary, rent & office bills)</option>
                        <option value="Doctor">Doctor (Focuses on clinical income, medical equipment)</option>
                        <option value="Business Owner">Business Owner (Focuses on corporate revenues, loan payments)</option>
                        <option value="Housewife">Housewife (Focuses on domestic budgeting, family expenditures)</option>
                        <option value="Middle-Class Family">Middle-Class Family (Focuses on mortgages, kids education)</option>
                        <option value="Lower-Income User">Lower-Income User (Focuses on savings optimization, essential bills)</option>
                        <option value="Other">Other / General User</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label small fw-semibold text-muted">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Create password" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label for="confirm_password" class="form-label small fw-semibold text-muted">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Verify password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 mb-3">Register Account</button>
            </form>

            <div class="text-center mt-3">
                <span class="small text-muted">Already have an account? <a href="/login" class="text-primary fw-semibold text-decoration-none">Sign In here</a></span>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
